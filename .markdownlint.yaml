# MD060: CJK 混在テーブルで aligned の誤検知があるため無効化。
# 要件定義書などは compact 形式（列パディングなし、| --- | 区切り）で記載すること。
# https://github.com/DavidAnson/markdownlint/issues/1869
MD060:
  enabled: false
  style: compact

# MD013: 1行の文字数制限を120文字に緩和（デフォルト80）
MD013:
  line_length: 120
  tables: false
  code_blocks: false

# MD024: 同じ階層のリンクを参照する場合は親リンクのみを使用
MD024:
  siblings_only: true